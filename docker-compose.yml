version: "3.8"

services:
  ghostbin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ghostbin-server
    ports:
      - "${PORT:-8788}:8788"
    volumes:
      - ghostbin-data:/app/data
    environment:
      - AUTH_KEY=${AUTH_KEY:?Set AUTH_KEY in your environment or .env file to a unique secret passphrase (e.g. run: openssl rand -base64 32)}
      # Maximum size (bytes) for a text paste's content. Default: 524288 (512 KB).
      - MAX_TEXT_SIZE=${MAX_TEXT_SIZE:-524288}
      # Maximum size (bytes) for a single file attachment. Default: 52428800 (50 MB).
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-52428800}
      # Set to your public URL to restrict CORS to your domain only.
      # This protects the /unlock endpoint from cross-origin CPU attacks.
      # Leave unset for local development (defaults to open CORS with a warning).
      # Example: ALLOWED_ORIGINS=https://paste.mydomain.com
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - RUST_LOG=info
    restart: unless-stopped

volumes:
  ghostbin-data:
