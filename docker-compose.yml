version: "3.8"

services:
  pastebin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pastebin-server
    ports:
      - "${PORT:-8788}:8788"
    volumes:
      - pastebin-data:/app/data
    environment:
      - AUTH_KEY=${AUTH_KEY:?Set AUTH_KEY in your environment or .env file to a unique secret passphrase (e.g. run: openssl rand -base64 32)}
      - MAX_UPLOAD_SIZE=${MAX_UPLOAD_SIZE:-52428800}
      - RUST_LOG=info
    restart: unless-stopped

volumes:
  pastebin-data:
